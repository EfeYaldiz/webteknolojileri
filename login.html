<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <h3 class="text-center mb-4">Sisteme Giriş</h3>
        
        <!-- onsubmit eventi ile form gönderilmeden önce JS fonksiyonu çalışacak -->
        <form action="login.php" method="POST" class="p-4 bg-white shadow rounded" onsubmit="return girisKontrol(event)">
            
            <div class="form-group">
                <label>Kullanıcı Adı (E-Posta)</label>
                <input type="text" id="kullaniciAdi" name="kullaniciAdi" class="form-control" placeholder="Örn: b240102009@sakarya.edu.tr">
            </div>
            
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="sifre" name="sifre" class="form-control">
            </div>
            
            <button type="submit" class="btn btn-warning btn-block">Giriş Yap</button>
            
            <!-- Yeni Eklenen: Ana Sayfaya Dön Butonu -->
            <a href="index.html" class="btn btn-secondary btn-block mt-2">Ana Sayfaya Dön</a>
            
            <!-- JavaScript hata mesajının yazdırılacağı alan -->
            <div id="loginHata" class="text-danger mt-3 font-weight-bold text-center"></div>
            
        </form>
    </div>

    <!-- JavaScript Doğrulama Kodları -->
    <script>
        function girisKontrol(event) {
            const email = document.getElementById("kullaniciAdi").value.trim();
            const sifre = document.getElementById("sifre").value.trim();
            const hataAlani = document.getElementById("loginHata");
            
            // Hata alanını sıfırla
            hataAlani.innerHTML = "";

            // 1. Boş Alan Kontrolü
            if (email === "" || sifre === "") {
                hataAlani.innerHTML = "Kullanıcı adı ve şifre boş bırakılamaz!";
                event.preventDefault(); // Formun PHP'ye gitmesini engeller
                return false;
            }

            // 2. Mail Formatı Kontrolü (Regex ile basit e-posta formatı denetimi)
            const emailFormat = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailFormat.test(email)) {
                hataAlani.innerHTML = "Lütfen geçerli bir e-posta adresi formatı giriniz!";
                event.preventDefault(); // Formun PHP'ye gitmesini engeller
                return false;
            }

            // Eğer hatalara takılmazsa true döner ve action="login.php" çalışır
            return true;
        }
        window.onload = function() {
            if(localStorage.getItem('isLogin') === 'true') {
                window.location.href = 'index.html';
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('durum') === 'hata') {
                document.getElementById("loginHata").innerHTML = "Kullanıcı adı veya şifre hatalı!";
            }
        };
    </script>
</body>
</html>
