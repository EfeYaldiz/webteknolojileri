<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>İlgi Alanlarım - Mehmet Efe</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand" href="index.html">Mehmet Efe</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                <li class="nav-item"><a class="nav-link" href="ozgecmis.html">Özgeçmiş</a></li>
                <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                <li class="nav-item"><a class="nav-link" href="mirasimiz.html">Mirasımız</a></li>
                <li class="nav-item"><a class="nav-link" href="ilgi-alanlari.html">İlgi Alanlarım</a></li>
                <li class="nav-item"><a class="nav-link" href="iletisim.html">İletişim</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="login.html" id="navLoginBtn">Giriş Yap</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mt-4">
        <section id="ilgi-alanlarim">
            <header><h2>İlgi Alanlarım</h2></header>
            <article>
                <p>Resident Evil ve Cyberpunk evrenlerine olan ilgimi API üzerinden test edebilirsiniz:</p>
                <button class="btn btn-dark" onclick="veriGetir('Resident Evil')">Resident Evil Bilgisi</button>
                <button class="btn btn-dark" onclick="veriGetir('Cyberpunk')">Cyberpunk Bilgisi</button>
                
                <div id="api-sonuc-alani" class="mt-4 p-3 border bg-white">
                    <h4 id="dizi-baslik">Veri bekleniyor...</h4>
                    <p id="dizi-puan"></p>
                    <p id="dizi-ozet"></p>
                </div>
            </article>
        </section>
    </main>

    <script>
        function veriGetir(kelime) {
            fetch('https://api.tvmaze.com/singlesearch/shows?q=' + kelime)
            .then(resp => resp.json())
            .then(data => {
                document.getElementById('dizi-baslik').innerHTML = data.name;
                document.getElementById('dizi-puan').innerHTML = "Puan: " + (data.rating.average || "Yok");
                document.getElementById('dizi-ozet').innerHTML = data.summary;
            });
        }

        if(localStorage.getItem('isLogin') === 'true') {
            const loginBtn = document.getElementById('navLoginBtn');
            loginBtn.innerText = "Çıkış Yap";
            loginBtn.className = "nav-link text-danger font-weight-bold";
            loginBtn.href = "#";
            loginBtn.onclick = function() { localStorage.removeItem('isLogin'); window.location.reload(); };
        }
    </script>
</body>
</html>
